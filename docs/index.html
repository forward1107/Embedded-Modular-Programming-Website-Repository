<title>嵌入式模块化编程学习平台</title>

<style>
/* ===== Variables & Reset ===== */
:root{--bg:#1e1e1e;--bg2:#252526;--bg3:#2d2d2d;--border:#3c3c3c;--text:#ccc;--text2:#888;--accent:#007acc;--accent2:#4ec9b0;--red:#f44747;--orange:#d7ba7d;--green:#4ec9b0;--ease:cubic-bezier(0.4,0,0.2,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
a{color:#3794ff;text-decoration:none}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#424242;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}

/* ===== Animations ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(60px)}}
@keyframes skeletonPulse{0%{opacity:0.6}50%{opacity:1}100%{opacity:0.6}}
.anim-fade{animation:fadeIn 0.3s var(--ease)}
.anim-slide{animation:slideInRight 0.35s var(--ease)}
.anim-card-exit{animation:fadeOut 0.25s var(--ease) forwards}
.anim-card-enter{animation:fadeIn 0.3s var(--ease) 0.1s both}

/* ===== Login ===== */
#login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1e1e1e,#2d2d2d);z-index:2000;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:40px;width:400px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:fadeIn 0.4s var(--ease)}
.login-box h1{color:var(--accent2);font-size:24px;text-align:center;margin-bottom:4px}
.login-box .sub{color:var(--text2);text-align:center;font-size:13px;margin-bottom:24px}
.login-box .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.login-box .tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.2s var(--ease)}
.login-box .tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.form-group{margin-bottom:14px}.form-group label{display:block;color:#aaa;font-size:12px;margin-bottom:4px}
.form-group input{width:100%;padding:10px 12px;background:#3c3c3c;border:1px solid #555;border-radius:4px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s var(--ease)}
.form-group input:focus{border-color:var(--accent)}
.btn{display:block;width:100%;padding:10px;border:none;border-radius:4px;font-size:14px;cursor:pointer;font-weight:600;transition:all 0.15s var(--ease);position:relative;overflow:hidden}
.btn:hover{opacity:0.9}.btn:active{transform:translateY(1px)}.btn-primary{background:var(--accent);color:#fff}
.auth-err{color:var(--red);font-size:13px;text-align:center;margin-top:8px;display:none}
.auth-switch{text-align:center;margin-top:14px;font-size:13px;color:var(--text2)}
.auth-switch a{color:#3794ff;cursor:pointer}
.remember-row{display:flex;align-items:center;gap:8px;margin-top:10px;color:var(--text2);font-size:13px}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent2)}

/* ===== Skeleton ===== */
.skeleton{background:linear-gradient(90deg,#2d2d2d 25%,#3c3c3c 50%,#2d2d2d 75%);background-size:400px 100%;animation:shimmer 1.5s infinite;border-radius:4px}
.skeleton-card{height:180px;border-radius:10px;margin-bottom:20px}

/* ===== App Shell ===== */
#app{display:none;height:100vh}
#app.active{display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:14px;z-index:10}
.topbar .logo{color:var(--accent2);font-size:16px;font-weight:700;cursor:pointer;transition:opacity 0.2s var(--ease)}
.topbar .logo:hover{opacity:0.8}
.topbar .top-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar .email{font-size:13px;color:var(--text2)}
.topbar .logout-btn{background:none;border:1px solid #555;color:#aaa;font-size:12px;padding:4px 10px;border-radius:3px;cursor:pointer;transition:all 0.2s var(--ease)}
.topbar .logout-btn:hover{color:var(--red);border-color:var(--red)}
.topbar .back-btn{background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;display:none;align-items:center;gap:4px;transition:color 0.2s var(--ease)}
.topbar .back-btn:hover{color:var(--text)}.topbar .back-btn.show{display:flex}
.topbar .version-badge{font-size:10px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-weight:600}

/* ===== Home Page ===== */
#home-page{flex:1;overflow-y:auto;display:none;padding:40px 20px}
#home-page.show{display:block;animation:fadeIn 0.3s var(--ease)}
#home-page h2{color:#ddd;font-size:22px;text-align:center;margin-bottom:8px}
#home-page .hint{color:#666;font-size:13px;text-align:center;margin-bottom:32px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;max-width:900px;margin:0 auto}
.cat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:28px;cursor:pointer;transition:all 0.25s var(--ease);position:relative;overflow:hidden;animation:fadeIn 0.4s var(--ease)}
.cat-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,122,204,0.15)}
.cat-card:active{transform:scale(0.98)}
.cat-card .cat-icon{font-size:40px;margin-bottom:12px}
.cat-card .cat-name{font-size:18px;color:#ddd;font-weight:600;margin-bottom:6px}
.cat-card .cat-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.cat-card .cat-progress{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--accent2)}
.cat-card .cat-progress-bar{flex:1;height:4px;background:#333;border-radius:2px;overflow:hidden}
.cat-card .cat-progress-bar .fill{height:100%;background:var(--accent2);border-radius:2px;transition:width 0.5s var(--ease)}

/* ===== Level Page ===== */
#level-page{flex:1;display:none;overflow:hidden}
#level-page.show{display:flex}
.sidebar{width:300px;min-width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:13px;color:var(--text2)}
.sidebar-header .cat-name{color:#ddd;font-weight:600}
.progress-summary{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;color:var(--text2);flex-shrink:0}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sdot-red{background:var(--red)}.sdot-green{background:var(--green)}
.level-group{margin-bottom:2px}
.level-header{padding:6px 16px;font-size:11px;letter-spacing:1px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:color 0.2s var(--ease)}
.level-header:hover{color:#aaa}.level-header .arrow{font-size:10px;transition:transform 0.25s var(--ease)}
.level-header .arrow.collapsed{transform:rotate(-90deg)}
.level-body{overflow:hidden;transition:max-height 0.3s var(--ease)}
.level-body.collapsed{max-height:0!important}
.challenge-list{flex:1;overflow-y:auto;padding:4px 0}
.challenge-item{display:flex;align-items:center;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:all 0.2s var(--ease)}
.challenge-item:hover{background:#2a2d2e}.challenge-item.active{background:#37373d;border-left-color:var(--accent)}
.challenge-item.locked{opacity:0.4;cursor:default}.challenge-item.locked:hover{background:transparent}
.challenge-item .num{width:28px;font-size:12px;font-weight:600;flex-shrink:0;color:#666}
.challenge-item.locked .num{color:#555}.challenge-item .name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.challenge-item.locked .name{color:#555}
.challenge-item .sdot2{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-left:8px;transition:all 0.3s var(--ease)}
.challenge-item .sdot2.locked-dot{background:transparent;border:2px solid #555}
.challenge-item .sdot2.unlocked-dot{background:var(--red);box-shadow:0 0 4px #f4474766}
.challenge-item .sdot2.inprogress-dot{background:var(--orange);box-shadow:0 0 4px #d7ba7d66}
.challenge-item .sdot2.completed-dot{background:var(--green);box-shadow:0 0 4px #4ec9b066}
.challenge-item.active .name{color:#fff}

/* ===== Toast ===== */
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 24px;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:toastIn 0.3s var(--ease);pointer-events:auto}
.toast-item.removing{animation:toastOut 0.3s var(--ease) forwards}
.toast-item .ti{font-size:20px}

/* ===== Content Header + Tabs ===== */
.content-header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.content-header h2{color:#ddd;font-size:15px;font-weight:500}
.content-header .lvl-badge{background:#007acc22;color:var(--accent);border:1px solid #007acc44;font-size:11px;padding:2px 10px;border-radius:10px}
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 12px}
.tab-btn{padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s var(--ease);background:none;border-top:0;border-left:0;border-right:0}
.tab-btn:hover{color:var(--text)}.tab-btn.active{color:#fff;border-bottom-color:var(--accent);background:var(--bg3)}
.tab-content{flex:1;display:none;overflow:hidden}
.tab-content.active{display:flex;flex-direction:column;animation:fadeIn 0.25s var(--ease)}
.tab-content#tab-detail{display:none;overflow-y:auto;padding:12px 20px}
.tab-content#tab-detail.active{display:block;overflow-y:auto}
.detail-section{margin-bottom:10px}
.detail-label{font-size:10px;letter-spacing:1px;color:var(--text2);margin-bottom:4px;font-weight:600}
.detail-text{color:var(--text);font-size:13px;line-height:1.6}
.detail-text ul{padding-left:18px;margin:4px 0}.detail-text li{margin-bottom:2px;list-style:disc}

/* ===== Example / Editor ===== */
#example-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
#example-wrap .editor-container{flex:1;min-height:0}
#editor-tab-body{flex:1;display:flex;overflow:hidden;min-height:0}
.file-tree{width:220px;min-width:80px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative;transition:width 0.3s var(--ease)}
.file-tree-header{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:12px;color:var(--text2)}
.file-tree-header .collapse-btn{background:none;border:1px solid #555;color:var(--text2);font-size:10px;padding:2px 6px;border-radius:3px;cursor:pointer;transition:all 0.2s var(--ease)}
.file-tree-header .collapse-btn:hover{color:var(--text);border-color:#888}
.file-tree-body{flex:1;overflow-y:auto;padding:4px 0;font-size:13px;user-select:none}
.ft-item{display:flex;align-items:center;gap:3px;padding:3px 12px;cursor:pointer;transition:background 0.2s var(--ease)}
.ft-item:hover{background:#2a2d2e}.ft-item.active{background:#37373d;color:#fff}
.ft-item .ft-icon{flex-shrink:0;font-size:14px;width:18px;text-align:center}
.ft-item .ft-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.ft-item .ft-arrow{font-size:10px;color:var(--text2);width:14px;flex-shrink:0;text-align:center;cursor:pointer;transition:transform 0.25s var(--ease)}
.ft-item .ft-arrow.rotated{transform:rotate(90deg)}
.ft-item .ft-arrow:hover{color:var(--text)}
.ft-children{overflow:hidden;transition:max-height 0.35s var(--ease)}

/* Split Pane */
.resize-handle{width:4px;cursor:col-resize;background:#333;flex-shrink:0;position:relative;transition:background 0.15s}
.resize-handle:hover,.resize-handle.active{background:var(--accent)}
.resize-handle::after{content:'';position:absolute;left:-3px;right:-3px;top:0;bottom:0}
#editor-holder{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#editor-holder .editor-container{flex:1;min-height:0}

/* Editor Loading Placeholder */
.editor-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:var(--bg);color:var(--text2);font-size:14px;gap:12px}
.editor-loading .spinner{width:28px;height:28px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}

/* ===== Action Bar + Terminal ===== */
.action-bar{padding:6px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;min-height:42px}
.btn-green{background:#238636;color:#fff;border:none;padding:7px 16px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s var(--ease)}
.btn-green:hover{background:#2ea043}.btn-green:active{transform:translateY(1px)}.btn-green:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.btn-green .spinner-sm{display:inline-block;width:14px;height:14px;border:2px solid #ffffff66;border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite}
.btn-amber{background:var(--orange);color:#1e1e1e;border:none;padding:7px 16px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s var(--ease)}
.btn-amber:hover{background:#e0c888}.btn-amber:active{transform:translateY(1px)}
.btn-outline{background:transparent;border:1px solid #555;color:var(--text);padding:6px 12px;border-radius:4px;font-size:12px;cursor:pointer;transition:all 0.2s var(--ease)}
.btn-outline:hover{border-color:#aaa}.btn-outline:active{transform:translateY(1px)}
.si{font-size:13px;margin-left:auto;display:flex;align-items:center;gap:6px}

#terminal-wrap{background:#0d0d0d;border-top:1px solid #333;height:150px;overflow:hidden;display:none;flex-shrink:0;flex-direction:column}
#terminal-wrap.open{display:flex}
#terminal-hdr{display:flex;align-items:center;gap:8px;padding:4px 16px;background:#1a1a1a;border-bottom:1px solid #333;flex-shrink:0}
#terminal-hdr span{font-size:11px;color:var(--text2)}#terminal-hdr button{background:none;border:1px solid #555;color:var(--text2);font-size:11px;padding:2px 8px;border-radius:3px;cursor:pointer;transition:all 0.2s var(--ease)}
#terminal-hdr button:hover{color:var(--text);border-color:#888}
#terminal-out{flex:1;overflow-y:auto;padding:8px 16px;font-family:'Consolas',monospace;font-size:13px;color:#d4d4d4;white-space:pre-wrap}
#terminal-out .err{color:var(--red)}#terminal-out .ok{color:var(--green)}#terminal-out .info{color:#888;font-style:italic}

/* ===== Error Page ===== */
.error-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px}
.error-page .err-icon{font-size:48px}.error-page .err-text{color:var(--text2);font-size:15px;text-align:center;max-width:400px;line-height:1.6}
.error-page .retry-btn{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s var(--ease)}
.error-page .retry-btn:hover{opacity:0.9}.error-page .retry-btn:active{transform:translateY(1px)}

/* ===== Modals ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.active{display:flex;animation:fadeIn 0.2s var(--ease)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:480px;max-width:95vw;max-height:85vh;overflow-y:auto;padding:28px;position:relative;animation:slideInRight 0.3s var(--ease)}
.modal h2{color:var(--accent2);margin-bottom:16px;font-size:18px}
.modal-close{position:absolute;top:14px;right:18px;color:var(--text2);font-size:20px;cursor:pointer;background:none;border:none;line-height:1;transition:color 0.2s var(--ease)}
.modal-close:hover{color:#fff}
.upload-msg{font-size:12px;padding:3px 0;display:none}
.upload-msg.success{color:var(--green);display:block}.upload-msg.error{color:var(--red);display:block}

/* ===== Context Menu ===== */
.file-tree-context{position:fixed;background:var(--bg2);border:1px solid #555;border-radius:4px;padding:4px 0;min-width:150px;z-index:500;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.5);animation:fadeIn 0.15s var(--ease)}
.file-tree-context .ctx-item{padding:6px 14px;font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.15s var(--ease)}
.file-tree-context .ctx-item:hover{background:#094771;color:#fff}
.file-tree-context .ctx-sep{height:1px;background:var(--border);margin:4px 0}

@media(max-width:1024px){.sidebar{width:260px;min-width:260px}}
.file-protocol-banner{position:fixed;top:0;left:0;right:0;z-index:99999;background:#f44747;color:#fff;padding:10px 20px;text-align:center;font-size:14px;font-family:sans-serif;animation:slideInRight 0.3s var(--ease)}
.file-protocol-banner code{background:#ffffff33;padding:2px 8px;border-radius:3px;margin:0 6px}
main{flex:1;overflow:hidden;display:flex;flex-direction:column}
</style></head><body>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<!-- LOGIN -->
<div id="login-overlay"><div class="login-box">
<h1>⚡ 嵌入式模块化编程</h1><p class="sub">控制类编程练习闯关平台</p>
<div class="tabs"><div class="tab active" id="tab-login" onclick="switchAuthTab('login')">登录</div><div class="tab" id="tab-register" onclick="switchAuthTab('register')">注册</div></div>
<div id="auth-login">
<div class="form-group"><label>邮箱</label><input type="email" id="login-email" placeholder="your@email.com"></div>
<div class="form-group"><label>密码</label><input type="password" id="login-pass" placeholder="至少6位" onkeydown="if(event.key==='Enter')handleLogin()"></div>
<div class="remember-row"><input type="checkbox" id="remember-me" checked><label for="remember-me">记住我</label></div>
<button class="btn btn-primary" onclick="handleLogin()" id="login-btn">登 录</button>
<div class="auth-err" id="login-err"></div>
<div class="auth-switch">没有账号？<a onclick="switchAuthTab('register')">注册新账号</a></div></div>
<div id="auth-register" style="display:none">
<div class="form-group"><label>邮箱</label><input type="email" id="reg-email" placeholder="your@email.com"></div>
<div class="form-group"><label>密码</label><input type="password" id="reg-pass" placeholder="至少6位"></div>
<div class="form-group"><label>确认密码</label><input type="password" id="reg-confirm" placeholder="再次输入" onkeydown="if(event.key==='Enter')handleRegister()"></div>

function selectExercise(id){
    const ex=practiceData.find(e=>e.id===id);if(!ex)return;if(!isUnlocked(id)){showToast('🔒','未解锁');return;}
    currentExercise=ex;
    document.querySelectorAll('.challenge-item').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.id)===id));

    document.getElementById('detail-req').innerHTML='<ul>'+ex.requirements.map(r=>'<li>'+r+'</li>').join('')+'</ul>';
    document.getElementById('detail-hints').innerHTML='<ul>'+ex.hints.map(h=>'<li>'+h+'</li>').join('')+'</ul>';
    if(Array.isArray(ex.testMethod))document.getElementById('detail-test').innerHTML='<ul>'+ex.testMethod.map(t=>'<li>'+t+'</li>').join('')+'</ul>';
    else document.getElementById('detail-test').innerHTML='<p>'+ex.testMethod+'</p>';
    setExampleCode(ex.exampleCode||'');
    renderFileTree();
    const af=tabState[ex.id]?.activeFile||ex.activeFile||'';

    // Use model reuse
    if(userEditor)switchEditorFile(af,content);
    else setUserCode(content);
    const ts=tabState[id];switchTab(ts?.activeTab||'detail');
    updateStatusLabel(getLevelStatus(id));
    // Animate content area
    const mc=document.getElementById('main-content');mc.classList.remove('anim-slide');void mc.offsetWidth;mc.classList.add('anim-slide');
}

// ===================================================================
function getActiveFiles(){return currentExercise?.files||[];}
function getFileContent(fs,path){for(const f of fs){if(f.type==='folder'&&f.children){const r=getFileContent(f.children,path);if(r!==undefined)return r;}const fp=getFilePath(f.name);if(fp===path)return f.content;}return undefined;}
function setFileContent(fs,path,c){for(const f of fs){if(f.type==='folder'&&f.children){if(setFileContent(f.children,path,c))return true;}if(getFilePath(f.name)===path){f.content=c;return true;}}return false;}
function getFilePath(name){if(!currentExercise)return name;let p='';function w(fs,pre){for(const f of fs){const cp=pre?pre+'/'+f.name:f.name;if(f.type==='folder'&&f.children)w(f.children,cp);else if(f.name===name)p=cp;}}w(currentExercise.files||[],'');return p||name;}
function getFolderKey(path){return(currentExercise?currentExercise.id:'0')+'_'+path;}
function cloneFiles(fs){return fs.map(f=>f.type==='folder'?{...f,children:f.children?cloneFiles(f.children):[]}:{...f});}

function renderFileTree(){
    const body=document.getElementById('file-tree-body');body.innerHTML='';
    const files=getActiveFiles();if(!files.length){body.innerHTML='<div style="padding:12px;color:#555">无文件</div>';return;}
    document.getElementById('ft-title').textContent=currentExercise?currentExercise.title:'文件';
    const activePath=tabState[currentExercise?.id]?.activeFile||currentExercise?.activeFile||'';
    function renderNode(fs,depth,parentPrefix){
        for(const f of fs){
            const cp=parentPrefix?parentPrefix+'/'+f.name:f.name;
            const div=document.createElement('div');div.className='ft-item'+(cp===activePath?' active':'');
            div.style.paddingLeft=(12+depth*16)+'px';div.dataset.path=cp;div.dataset.type=f.type;
            if(f.type==='folder'){
                const key=getFolderKey(cp);
                if(folderOpenState[key]===undefined)folderOpenState[key]=false;
                const open=folderOpenState[key];
                div.innerHTML='<span class="ft-arrow'+(open?' rotated':'')+'">▶</span><span class="ft-icon">'+(open?'📂':'📁')+'</span><span class="ft-name">'+f.name+'</span>';
                const arrow=div.querySelector('.ft-arrow');
                arrow.onclick=function(e){e.stopPropagation();folderOpenState[key]=!folderOpenState[key];renderFileTree();};
                div.onclick=function(e){if(e.target===arrow)return;folderOpenState[key]=!folderOpenState[key];renderFileTree();};
                div.oncontextmenu=function(e){e.preventDefault();ctxTargetPath=cp;ctxTargetPathType='folder';showCtxMenu(e);};
                body.appendChild(div);
                if(open&&f.children){
                    const childWrap=document.createElement('div');childWrap.className='ft-children';
                    childWrap.style.maxHeight=open?'2000px':'0';
                    body.appendChild(childWrap);
                    // Recursive with hidden children for animation
                    const innerBody=document.createElement('div');
                    renderNode(f.children,depth+1,cp);
                }
            }else{
                div.innerHTML='<span class="ft-arrow" style="visibility:hidden">▶</span><span class="ft-icon">📄</span><span class="ft-name">'+f.name+'</span>';
                div.onclick=function(){selectFile(cp);};
                div.oncontextmenu=function(e){e.preventDefault();ctxTargetPath=cp;ctxTargetPathType='file';showCtxMenu(e);};
                body.appendChild(div);
            }
        }
    }
    renderNode(files,0,'');
}
function selectFile(path){
    if(!currentExercise)return;if(!tabState[currentExercise.id])tabState[currentExercise.id]={};
    tabState[currentExercise.id].activeFile=path;renderFileTree();
    const content=getFileContent(getActiveFiles(),path);
    if(userEditor)switchEditorFile(path,content);else if(content!==undefined)setUserCode(content);
}
function showCtxMenu(e){
    const m=document.getElementById('ctx-menu');
    m.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';m.style.top=e.clientY+'px';m.style.display='block';
    setTimeout(()=>document.addEventListener('click',function(){m.style.display='none';},{once:true}),10);
}
function ctxAction(action){
    document.getElementById('ctx-menu').style.display='none';
    if(!currentExercise||!ctxTargetPath)return;
    const files=getActiveFiles();const parts=ctxTargetPath.split('/');const fileName=parts.pop();const parentPath=parts.join('/');
    const isFolder=ctxTargetPathType==='folder';
    function findParent(fs,ppath){
        if(!ppath)return fs;
        for(const f of fs){if(f.type==='folder'){const fp=getFilePath(f.name);if(fp===ppath)return f.children;if(f.children){const r=findParent(f.children,ppath);if(r)return r;}}}
        return null;
    }
    let parent=isFolder?findParent(files,ctxTargetPath):findParent(files,parentPath);
    if(!parent)parent=files;
    if(action==='new-file'||action==='new-folder'){
        const name=prompt('输入'+(action==='new-file'?'文件':'文件夹')+'名:');if(!name)return;
        if(action==='new-file')parent.push({name,type:'file',content:''});
        else parent.push({name,type:'folder',children:[]});
        renderFileTree();
        if(action==='new-file'){const np=isFolder?ctxTargetPath+'/'+name:(parentPath?parentPath+'/'+name:name);selectFile(np);}
    }else if(action==='rename'){
        const newName=prompt('新名称:',fileName);if(!newName)return;
        for(const f of parent){if(f.name===fileName){f.name=newName;break;}}
        renderFileTree();
    }else if(action==='delete'){
        if(!confirm('确定删除 "'+fileName+'" 吗？'))return;
        const idx=parent.findIndex(f=>f.name===fileName);if(idx>=0){parent.splice(idx,1);renderFileTree();
            const active=tabState[currentExercise.id]?.activeFile||'';
            if(active===ctxTargetPath&&parent.length>0){
                const first=parent[0];const fp=first.type==='folder'?(first.children?first.children[0]?.name:''):first.name;
                if(fp)selectFile(parentPath?parentPath+'/'+fp:fp);
            }
        }
    }
}
function toggleFileTree(){
    fileTreeCollapsed=!fileTreeCollapsed;
    const panel=document.getElementById('file-tree-panel');
    panel.style.width=fileTreeCollapsed?'40px':'220px';panel.style.minWidth=fileTreeCollapsed?'40px':'220px';
    panel.querySelector('.collapse-btn').textContent=fileTreeCollapsed?'▶ 展开':'◀ 收起';
    panel.querySelector('.file-tree-body').style.display=fileTreeCollapsed?'none':'';
    document.getElementById('resize-handle').style.display=fileTreeCollapsed?'none':'block';

}
(function(){const handle=document.getElementById('resize-handle');let dragging=false;
    handle.addEventListener('mousedown',function(){dragging=true;handle.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none';});

function markComplete(){if(!currentExercise)return;if(!isUnlocked(currentExercise.id)){showToast('🔒','未解锁');return;}
    if((progress.completedLevels||[]).includes(currentExercise.id)){showToast('ℹ️','已完成');return;}
    const af=tabState[currentExercise.id]?.activeFile||currentExercise?.activeFile||'';
    const code=getUserCode();if(af&&code)setFileContent(getActiveFiles(),af,code);
    completeLevel(currentExercise.id);}
async function runCode(){
    if(!currentExercise){showToast('⚠️','请选择题目');return;}const code=getUserCode();if(!code.trim()){showToast('⚠️','代码为空');return;}
    if(/^\s*#\s*include\s*[<"]stm32/i.test(code)){showToast('⚠️','含硬件代码，请本地编译');terminalPrint('⚠️ 硬件代码需本地编译','info');return;}
    const btn=document.getElementById('run-btn');const orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="spinner-sm"></span> 运行中...';
    const term=document.getElementById('terminal-wrap');term.classList.add('open');terminalPrint('▶ 编译运行...\n','info');
    try{const res=await fetch('https://wandbox.org/api/compile.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({compiler:'gcc-head',code,options:'-Wall -std=c11'})});
        const data=await res.json();if(data.status==='0'){if(data.program_output)terminalPrint(data.program_output,'ok');else if(data.compiler_error)terminalPrint(data.compiler_error,'err');else terminalPrint('✅ 编译成功','ok');}
        else{terminalPrint('状态:'+data.status+'\n','err');if(data.compiler_error)terminalPrint(data.compiler_error,'err');if(data.program_output)terminalPrint(data.program_output,'ok');}
    }catch(e){terminalPrint('❌ '+e.message,'err');}finally{btn.disabled=false;btn.innerHTML=orig;}
}
function terminalPrint(t,c){const o=document.getElementById('terminal-out');o.innerHTML+='<div class="'+(c||'')+'">'+t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/ /g,'&nbsp;')+'</div>';o.scrollTop=o.scrollHeight;}
function clearTerminal(){document.getElementById('terminal-out').innerHTML='';}
function hideTerminal(){document.getElementById('terminal-wrap').classList.remove('open');}
async function saveToLocal(){
    if(!currentExercise||!currentExercise.files){showToast('⚠️','无文件');return;}
    const files=currentExercise.files;
    if(window.showDirectoryPicker){try{const dh=await window.showDirectoryPicker({mode:'readwrite'});let cnt=0;
        async function wf(fs,parent){for(const f of fs){if(f.type==='folder'){const sub=await parent.getDirectoryHandle(f.name,{create:true});if(f.children)await wf(f.children,sub);}else{const fh=await parent.getFileHandle(f.name,{create:true});const w=await fh.createWritable();await w.write(f.content||'');await w.close();cnt++;}}}
        await wf(files,dh);showToast('✅','保存成功！共'+cnt+'个文件');}catch(e){if(e.name!=='AbortError')fallbackZip(files);}}else fallbackZip(files);
}
function fallbackZip(files){if(typeof JSZip==='undefined'){showToast('⚠️','浏览器不支持');return;}
    const zip=new JSZip();function add(fs,p){for(const f of fs){if(f.type==='folder'){const s=p.folder(f.name);if(f.children)add(f.children,s);}else p.file(f.name,f.content||'');}}
    add(files,zip);zip.generateAsync({type:'blob'}).then(function(blob){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='level'+String(currentExercise.id).padStart(2,'0')+'.zip';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);showToast('✅','ZIP 下载成功');});}
function openUploadModal(){if(!currentExercise){showToast('⚠️','请选择题目');return;}
    document.getElementById('gh-path').value='level'+String(currentExercise.id).padStart(2,'0')+'/main.c';document.getElementById('gh-msg').value='Add level '+String(currentExercise.id).padStart(2,'0');
    const u=currentUser?currentUser.email||currentUser.uid:'';if(localStorage.getItem('gh_token_'+u))document.getElementById('gh-token').value=localStorage.getItem('gh_token_'+u);
    if(localStorage.getItem('gh_repo_'+u))document.getElementById('gh-repo').value=localStorage.getItem('gh_repo_'+u);if(localStorage.getItem('gh_branch_'+u))document.getElementById('gh-branch').value=localStorage.getItem('gh_branch_'+u);else document.getElementById('gh-branch').value='main';
    document.getElementById('upload-status').className='upload-msg';document.getElementById('upload-status').textContent='';document.getElementById('upload-modal').classList.add('active');}
function closeUploadModal(){document.getElementById('upload-modal').classList.remove('active');}
document.getElementById('upload-modal').addEventListener('click',e=>{if(e.target===document.getElementById('upload-modal'))closeUploadModal();});
async function uploadToGitHub(){const t=document.getElementById('gh-token').value.trim(),r=document.getElementById('gh-repo').value.trim(),b=document.getElementById('gh-branch').value.trim()||'main',p=document.getElementById('gh-path').value.trim(),m=document.getElementById('gh-msg').value.trim()||'Update',st=document.getElementById('upload-status');
    if(!t||!r||!p){st.className='upload-msg error';st.textContent='请填写完整';return;}if(!r.includes('/')){st.className='upload-msg error';st.textContent='格式 owner/repo';return;}
    const u=currentUser?currentUser.email||currentUser.uid:'';localStorage.setItem('gh_token_'+u,t);localStorage.setItem('gh_repo_'+u,r);localStorage.setItem('gh_branch_'+u,b);
    const c=getUserCode();if(!c.trim()){st.className='upload-msg error';st.textContent='代码为空';return;}
    st.className='upload-msg';st.textContent='⏳ 上传中...';
    try{const content=btoa(unescape(encodeURIComponent(c)));const res=await fetch('https://api.github.com/repos/'+r+'/contents/'+p,{method:'PUT',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify({message:m,content,branch:b})});const data=await res.json();if(res.ok){st.className='upload-msg success';st.textContent='✅ 成功';showToast('✅','上传成功');if(currentExercise&&!progress.completedLevels.includes(currentExercise.id))completeLevel(currentExercise.id);}else{st.className='upload-msg error';st.textContent='❌ '+(data.message||res.statusText);}}catch(e){st.className='upload-msg error';st.textContent='❌ '+e.message;}}
document.addEventListener('keydown',e=>{if(!currentExercise)return;const ids=practiceData.map(x=>x.id);const idx=ids.indexOf(currentExercise.id);if(e.key==='ArrowUp'){e.preventDefault();for(let i=idx-1;i>=0;i--){if(isUnlocked(ids[i])){selectExercise(ids[i]);break;}}}if(e.key==='ArrowDown'){e.preventDefault();for(let i=idx+1;i<ids.length;i++){if(isUnlocked(ids[i])){selectExercise(ids[i]);break;}}}if(e.key==='F5'){e.preventDefault();runCode();}});

function shareLink(){
    const url=window.location.href;
    if(navigator.clipboard){
        navigator.clipboard.writeText(url).then(()=>{
            showToast('🔗','链接已复制到剪贴板！');
        }).catch(()=>{
            fallbackCopy(url);
        });
    }else{
        fallbackCopy(url);
    }
}
function fallbackCopy(text){
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');showToast('🔗','链接已复制到剪贴板！');}
    catch(e){showToast('⚠️','复制失败，请手动复制地址栏链接');}
    document.body.removeChild(ta);
}
